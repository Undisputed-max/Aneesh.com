<!-- ═══════════════════════════════════════════
     CONTACT POPUP OVERLAY
     Paste this entire block just before </body> in index.html
     Replace YOUR_SERVICE_ID, YOUR_ENQUIRY_TEMPLATE_ID,
     YOUR_THANKYOU_TEMPLATE_ID, YOUR_PUBLIC_KEY below
════════════════════════════════════════════ -->

<!-- OVERLAY BACKDROP -->
<div id="contactOverlay" style="
  display:none;
  position:fixed;inset:0;z-index:9000;
  background:rgba(8,10,14,.88);
  backdrop-filter:blur(8px);
  align-items:center;justify-content:center;
  padding:1rem;
" onclick="closeContactPopup(event)">

  <!-- POPUP CARD -->
  <div style="
    background:#0f1117;
    border:1px solid rgba(232,255,71,.18);
    max-width:560px;width:100%;
    padding:2.5rem;
    position:relative;
    box-shadow:0 40px 100px rgba(0,0,0,.6);
    max-height:90vh;overflow-y:auto;
  " onclick="event.stopPropagation()">

    <!-- CLOSE BTN -->
    <button onclick="closeContactPopup()" style="
      position:absolute;top:1.25rem;right:1.25rem;
      background:none;border:none;cursor:pointer;
      font-family:'JetBrains Mono',monospace;font-size:.75rem;
      color:rgba(107,114,128,.7);text-transform:uppercase;letter-spacing:.1em;
      transition:color .2s;
    " onmouseover="this.style.color='#e8ff47'" onmouseout="this.style.color='rgba(107,114,128,.7)'">✕ Close</button>

    <!-- HEADER -->
    <div style="margin-bottom:2rem;">
      <div style="
        font-family:'JetBrains Mono',monospace;font-size:.65rem;
        color:#e8ff47;text-transform:uppercase;letter-spacing:.2em;
        display:flex;align-items:center;gap:.6rem;margin-bottom:.6rem;
      ">
        <span style="display:inline-block;width:20px;height:1px;background:#e8ff47;"></span>
        Get in touch
      </div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:#fff;line-height:1;">Let's Build<br><span style="color:#e8ff47;">Something</span></div>
    </div>

    <!-- FORM -->
    <div id="contactForm">

      <!-- Name -->
      <div style="margin-bottom:1.1rem;">
        <label style="
          font-family:'JetBrains Mono',monospace;font-size:.6rem;
          color:rgba(107,114,128,.8);text-transform:uppercase;letter-spacing:.12em;
          display:block;margin-bottom:.4rem;
        ">Your Name *</label>
        <input id="cf_name" type="text" placeholder="John Smith" style="
          width:100%;background:#141720;border:1px solid rgba(255,255,255,.08);
          color:#e8e8e8;font-family:'DM Sans',sans-serif;font-size:.9rem;
          padding:.75rem 1rem;outline:none;transition:border-color .2s;
        "
        onfocus="this.style.borderColor='rgba(232,255,71,.4)'"
        onblur="this.style.borderColor='rgba(255,255,255,.08)'"
        />
      </div>

      <!-- Company -->
      <div style="margin-bottom:1.1rem;">
        <label style="
          font-family:'JetBrains Mono',monospace;font-size:.6rem;
          color:rgba(107,114,128,.8);text-transform:uppercase;letter-spacing:.12em;
          display:block;margin-bottom:.4rem;
        ">Company / Studio *</label>
        <input id="cf_company" type="text" placeholder="Awesome Games Studio" style="
          width:100%;background:#141720;border:1px solid rgba(255,255,255,.08);
          color:#e8e8e8;font-family:'DM Sans',sans-serif;font-size:.9rem;
          padding:.75rem 1rem;outline:none;transition:border-color .2s;
        "
        onfocus="this.style.borderColor='rgba(232,255,71,.4)'"
        onblur="this.style.borderColor='rgba(255,255,255,.08)'"
        />
      </div>

      <!-- Email -->
      <div style="margin-bottom:1.1rem;">
        <label style="
          font-family:'JetBrains Mono',monospace;font-size:.6rem;
          color:rgba(107,114,128,.8);text-transform:uppercase;letter-spacing:.12em;
          display:block;margin-bottom:.4rem;
        ">Email Address *</label>
        <input id="cf_email" type="email" placeholder="john@studio.com" style="
          width:100%;background:#141720;border:1px solid rgba(255,255,255,.08);
          color:#e8e8e8;font-family:'DM Sans',sans-serif;font-size:.9rem;
          padding:.75rem 1rem;outline:none;transition:border-color .2s;
        "
        onfocus="this.style.borderColor='rgba(232,255,71,.4)'"
        onblur="this.style.borderColor='rgba(255,255,255,.08)'"
        />
      </div>

      <!-- Message -->
      <div style="margin-bottom:1.75rem;">
        <label style="
          font-family:'JetBrains Mono',monospace;font-size:.6rem;
          color:rgba(107,114,128,.8);text-transform:uppercase;letter-spacing:.12em;
          display:block;margin-bottom:.4rem;
        ">What are you building? *</label>
        <textarea id="cf_message" rows="4" placeholder="Tell me about the role or project — genre, team size, what systems you need built..." style="
          width:100%;background:#141720;border:1px solid rgba(255,255,255,.08);
          color:#e8e8e8;font-family:'DM Sans',sans-serif;font-size:.9rem;
          padding:.75rem 1rem;outline:none;resize:vertical;
          transition:border-color .2s;
        "
        onfocus="this.style.borderColor='rgba(232,255,71,.4)'"
        onblur="this.style.borderColor='rgba(255,255,255,.08)'"
        ></textarea>
      </div>

      <!-- Error msg -->
      <div id="cf_error" style="
        display:none;
        font-family:'JetBrains Mono',monospace;font-size:.65rem;
        color:#ff6b6b;margin-bottom:1rem;letter-spacing:.05em;
      "></div>

      <!-- Submit -->
      <button id="cf_submit" onclick="submitContactForm()" style="
        width:100%;padding:.9rem 2rem;
        background:#e8ff47;color:#080a0e;
        font-family:'JetBrains Mono',monospace;font-size:.78rem;
        text-transform:uppercase;letter-spacing:.1em;font-weight:500;
        border:none;cursor:pointer;transition:opacity .2s;
      "
      onmouseover="this.style.opacity='.88'"
      onmouseout="this.style.opacity='1'"
      >Send Message</button>

    </div>

    <!-- SUCCESS STATE -->
    <div id="contactSuccess" style="display:none;text-align:center;padding:2rem 0;">
      <div style="font-size:2.5rem;margin-bottom:1rem;">✓</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:#e8ff47;margin-bottom:.75rem;">Message Sent!</div>
      <div style="font-family:'DM Sans',sans-serif;font-size:.9rem;color:#6b7280;line-height:1.7;">
        Thanks for reaching out. Check your inbox —<br>a confirmation is on its way to you.
      </div>
    </div>

  </div>
</div>

<script>
// ── EMAILJS CONFIG — fill these in ──────────────────────
const EMAILJS_SERVICE_ID      = 'service_pbqkoac';
const EMAILJS_ENQUIRY_TEMPLATE = 'template_rovon0b';   // email YOU receive
const EMAILJS_THANKS_TEMPLATE  = 'template_zw16bit';  // email THEY receive
const EMAILJS_PUBLIC_KEY       = 'vI9LKB4ZqKjnbSiO1';
// ────────────────────────────────────────────────────────

// Init EmailJS with your key
emailjs.init(vI9LKB4ZqKjnbSiO1);

function openContactPopup() {
  const overlay = document.getElementById('contactOverlay');
  overlay.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  // reset form state
  document.getElementById('contactForm').style.display = 'block';
  document.getElementById('contactSuccess').style.display = 'none';
  document.getElementById('cf_error').style.display = 'none';
  document.getElementById('cf_submit').textContent = 'Send Message';
  document.getElementById('cf_submit').disabled = false;
}

function closeContactPopup(e) {
  if (e && e.target !== document.getElementById('contactOverlay')) return;
  document.getElementById('contactOverlay').style.display = 'none';
  document.body.style.overflow = '';
}

// Close on Escape key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('contactOverlay').style.display = 'none';
    document.body.style.overflow = '';
  }
});

async function submitContactForm() {
  const name    = document.getElementById('cf_name').value.trim();
  const company = document.getElementById('cf_company').value.trim();
  const email   = document.getElementById('cf_email').value.trim();
  const message = document.getElementById('cf_message').value.trim();
  const errEl   = document.getElementById('cf_error');
  const submitBtn = document.getElementById('cf_submit');

  // Validate
  if (!name || !company || !email || !message) {
    errEl.textContent = '→ Please fill in all fields.';
    errEl.style.display = 'block';
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errEl.textContent = '→ Please enter a valid email address.';
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';

  // Loading state
  submitBtn.textContent = 'Sending...';
  submitBtn.disabled = true;

  const templateParams = {
    from_name:    name,
    from_company: company,
    from_email:   email,
    message:      message,
  };

  try {
    // Send enquiry to YOU
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_ENQUIRY_TEMPLATE, templateParams);
    // Send thank-you to THEM
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_THANKS_TEMPLATE, templateParams);

    // Show success
    document.getElementById('contactForm').style.display = 'none';
    document.getElementById('contactSuccess').style.display = 'block';

    // Clear fields
    ['cf_name','cf_company','cf_email','cf_message'].forEach(id => {
      document.getElementById(id).value = '';
    });

  } catch (err) {
    console.error('EmailJS error:', err);
    errEl.textContent = '→ Something went wrong. Please try thodupunoorianeesh@gmail.com directly.';
    errEl.style.display = 'block';
    submitBtn.textContent = 'Send Message';
    submitBtn.disabled = false;
  }
}
</script>
